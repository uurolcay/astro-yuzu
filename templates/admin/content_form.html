{% extends "base.html" %}

{% block title %}Focus Astrology | Admin Content Form{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container">
        <div class="glass-card card-pad">
            <div class="row-between">
                <div>
                    <p class="eyebrow">Content Management</p>
                    <h1 class="hero-title" style="font-size:2.3rem;">{% if mode == "new" %}New Content{% else %}Edit Content{% endif %}</h1>
                </div>
                <a class="chip" href="/admin/content">Back to Content</a>
            </div>

            {% if error %}<div class="metric-card" style="margin-top:18px; border-color:rgba(224,108,117,.45); color:#f1b5b5;">{{ error }}</div>{% endif %}

            <form method="post" style="display:grid; gap:14px; margin-top:24px;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label>
                    <span class="muted">Title</span>
                    <input type="text" name="title" value="{{ article.title }}" required style="width:100%; margin-top:6px;">
                </label>
                <label>
                    <span class="muted">Slug</span>
                    <input type="text" name="slug" value="{{ article.slug }}" style="width:100%; margin-top:6px;">
                </label>
                <label>
                    <span class="muted">Content</span>
                    <textarea name="content" rows="16" style="width:100%; margin-top:6px;">{{ article.content }}</textarea>
                </label>
                <label>
                    <span class="muted">Status</span>
                    <select name="status" style="width:100%; margin-top:6px;">
                        <option value="draft" {% if article.status == "draft" %}selected{% endif %}>draft</option>
                        <option value="published" {% if article.status == "published" %}selected{% endif %}>published</option>
                    </select>
                </label>
                <button class="btn btn-primary" type="submit">Save Content</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
